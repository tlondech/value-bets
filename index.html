    /* EV tier colors — driven by runtime value, can't use Tailwind JIT for these */

    .ev-danger  { color: #ef4444; font-weight: 700; }
    /* Hide scrollbars on mobile filter bar */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    /* Column header info tooltips */
    .col-tip { position: relative; display: inline-flex; align-items: center; gap: 3px; cursor: help; }

    /* 📱 MOBILE FIRST: Fixed 'Toast' at the bottom of the screen */
    .col-tip .tip {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translate(-50%, 10px);
      background: #1f2937; color: #f9fafb;
      font-size: 0.75rem; font-weight: 500; text-transform: none; letter-spacing: 0;
      padding: 12px 16px; border-radius: 10px; white-space: normal;
      pointer-events: none; opacity: 0; transition: all 0.2s ease-out;
      z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      width: calc(100vw - 32px); max-width: 320px;
      text-align: center; line-height: 1.5;
    }

    /* Reveal states for Mobile Toast */
    .col-tip.active .tip { opacity: 1; transform: translate(-50%, 0); }
    @media (hover: hover) {
      .col-tip:hover .tip { opacity: 1; transform: translate(-50%, 0); }
    }

    /* 💻 DESKTOP OVERRIDE: Revert to classic floating tooltips */
    @media (min-width: 768px) {
      .col-tip .tip {
        position: absolute;
        bottom: calc(100% + 8px);
        top: auto;
        /* 1. ANCHOR LEFT BY DEFAULT (Fixes BTTS bleeding left) */
        left: 0;
        transform: translateY(4px);
        width: max-content;
        max-width: 300px; /* Safe width for desktop */
        text-align: left;
        padding: 8px 12px;
        border-radius: 7px;
      }

      /* Reveal states for Desktop */
      .col-tip.active .tip { transform: translateY(0); }
      @media (hover: hover) {
        .col-tip:hover .tip { transform: translateY(0); }
      }

      /* 2. ANCHOR RIGHT FOR DATA COLUMNS (Fixes EV/Odds bleeding right) */
      .col-tip.justify-end .tip {
        left: auto;
        right: 0; /* Locks the right side of the tooltip to the right side of the text */
      }
    }
  </style>

<script>
  // ---------------------------------------------------------------------------
  // Helpers
  // ---------------------------------------------------------------------------

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function formatDate(isoString) {
    const d = new Date(isoString);
    return d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
  }

  function formatKickoff(isoString) {
    if (!isoString) return "—";
    const d = new Date(isoString);
    return d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
  }

  const LEAGUE_COLORS = {
    ucl:        "bg-indigo-700 dark:bg-indigo-800",          // Champions League — deep indigo
    epl:        "bg-purple-700 dark:bg-purple-800",           // Premier League — purple
    laliga:     "bg-orange-600 dark:bg-orange-700",           // La Liga — orange/red
    seriea:     "bg-sky-600 dark:bg-sky-700",                 // Serie A — sky blue
    bundesliga: "bg-red-600 dark:bg-red-700",                 // Bundesliga — red
    ligue1:     "bg-emerald-600 dark:bg-emerald-700",         // Ligue 1 — green
  };

  const LEAGUE_SHORT = { ucl: "UCL", epl: "EPL", laliga: "La Liga", seriea: "Serie A", bundesliga: "Bundesliga", ligue1: "Ligue 1" };

  function leagueColor(key) {
    return LEAGUE_COLORS[key] || "bg-gray-600 dark:bg-gray-700";
  }

  function evClass(ev) {
    if (ev > 0.20) return "ev-danger";    // >20% — suspicious, likely stale data
    if (ev >= 0.10) return "ev-warning";  // 10–20% — great find
    return "ev-success";                  // 0–10% — standard value
  }

  // ---------------------------------------------------------------------------
  // Card renderer
  // ---------------------------------------------------------------------------

  function renderCard(match) {
    const kickoff    = match.kickoff ? formatKickoff(match.kickoff) : "—";
    const leagueName = LEAGUE_SHORT[match.league_key] || match.league_name || "";
    const stageBadge = match.stage
      ? `<span class="inline-block bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 text-xs font-medium px-2 py-0.5 rounded mb-2 ml-1">${escHtml(match.stage)}</span>`
      : "";
    const homeRank = match.home_rank
      ? `<span class="text-xs text-gray-400 dark:text-gray-500 font-normal tabular-nums">#${match.home_rank}</span> `
      : "";
    const awayRank = match.away_rank
      ? `<span class="text-xs text-gray-400 dark:text-gray-500 font-normal tabular-nums">#${match.away_rank}</span> `
      : "";

    const INFO = `<svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor" style="opacity:.55;flex-shrink:0"><circle cx="8" cy="8" r="7.5" stroke="currentColor" stroke-width="1" fill="none"/><rect x="7.25" y="7" width="1.5" height="5" rx=".75"/><circle cx="8" cy="4.5" r=".9"/></svg>`;
    const WARN_ICON = `<svg class="inline-block w-3 h-3 shrink-0 align-[-0.1em]" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>`;

    const betRows = match.bets.map(b => {
      const oddsReturn = (b.odds * 10).toFixed(2);
      const oddsProfit = ((b.odds - 1) * 10).toFixed(2);
      const probPct    = (b.true_prob * 100).toFixed(1);
      const evPct      = (b.ev * 100).toFixed(1);
      const evReturn   = (100 * (1 + b.ev)).toFixed(2);
      return `
      <tr class="border-b border-gray-100 dark:border-gray-800 last:border-0">
        <td class="py-2 pr-4 align-middle">
          <span class="inline-block bg-blue-50 dark:bg-blue-950 text-blue-700 dark:text-blue-300 border border-blue-200 dark:border-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded select-none">
            ${escHtml(b.outcome_label)}
          </span>
        </td>
        <td class="py-2 pr-4 font-mono text-right text-sm tabular-nums align-middle">
          <span class="col-tip justify-end">${b.odds.toFixed(2)}<span class="tip">Decimal bookmaker odds. ${b.odds.toFixed(2)} means a €10 bet returns €${oddsReturn} total (€${oddsProfit} profit).</span></span>
        </td>
        <td class="py-2 pr-4 font-mono text-right text-sm tabular-nums align-middle text-gray-600 dark:text-gray-400">
          <span class="col-tip justify-end">${probPct}%<span class="tip">Model's estimated true probability. ${probPct}% means the model expects this outcome about ${probPct} times in 100.</span></span>
        </td>
        <td class="py-2 font-mono text-right text-sm tabular-nums align-middle ${evClass(b.ev)}">
          <span class="col-tip justify-end">${b.ev > 0.20 ? WARN_ICON + " " : ""}+${evPct}%<span class="tip">Expected Value = (prob × odds) − 1. At +${evPct}%, a €100 bet returns €${evReturn} on average over many bets.</span></span>
        </td>
      </tr>`;
    }).join("");

    const bttsRow = match.btts_yes_prob != null
      ? `<p class="mt-1 text-xs text-gray-400 dark:text-gray-500">
           <span class="col-tip">BTTS ${INFO}
             <span class="tip">Both Teams To Score — probability both sides net at least 1 goal.</span>
           </span>
           <span class="font-mono font-medium text-gray-600 dark:text-gray-300 ml-1">${(match.btts_yes_prob * 100).toFixed(1)}%</span>
         </p>`
      : "";

    const fatigueWarnings = [];
    if (match.home_rest_days != null && match.home_rest_days < 4)
      fatigueWarnings.push(`${escHtml(match.home_team)} ${match.home_rest_days} days rest`);
    if (match.away_rest_days != null && match.away_rest_days < 4)
      fatigueWarnings.push(`${escHtml(match.away_team)} ${match.away_rest_days} days rest`);
    const fatigueRow = fatigueWarnings.length
      ? `<p class="mt-1 text-xs text-amber-500 dark:text-amber-400 font-medium flex items-center gap-1">${WARN_ICON} ${fatigueWarnings.join("  ·  ")}</p>`
      : "";
    const h2hBadge = match.h2h_used
      ? `<span class="inline-block text-xs text-gray-400 dark:text-gray-500 ml-1" title="Head-to-head history blended into model">Head-to-Head</span>`
      : "";

    // 2nd Leg badge
    const secondLegBadge = match.is_second_leg
      ? `<span class="inline-block bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-300 text-xs font-bold px-2 py-0.5 rounded mb-2 ml-1 uppercase tracking-wider">2nd Leg</span>`
      : "";

    // Aggregate score row
    let aggRow = "";
    if (match.is_second_leg && match.agg_home != null && match.agg_away != null) {
      const diff = match.agg_home - match.agg_away;
      const homeLeads = diff > 0;
      const awayLeads = diff < 0;

      const homeScoreClass = homeLeads
        ? "text-green-600 dark:text-green-400 font-bold"
        : awayLeads ? "text-red-500 dark:text-red-400" : "text-gray-700 dark:text-gray-200";
      const awayScoreClass = awayLeads
        ? "text-green-600 dark:text-green-400 font-bold"
        : homeLeads ? "text-red-500 dark:text-red-400" : "text-gray-700 dark:text-gray-200";

      aggRow = `
        <p class="mt-1 flex items-center gap-x-1 text-xs text-gray-500 dark:text-gray-400">
          <span class="font-semibold text-gray-700 dark:text-gray-200">Agg:</span>
          <span class="font-mono font-semibold">
            <span class="${homeScoreClass}">${match.agg_home}</span><span class="text-gray-400 dark:text-gray-600">–</span><span class="${awayScoreClass}">${match.agg_away}</span>
          </span>
        </p>`;
    }
    const homeCrest = match.home_crest
      ? `<img src="${escHtml(match.home_crest)}" class="inline-block w-5 h-5 object-contain mr-1 align-middle" onerror="this.style.display='none'" loading="lazy">`
      : "";
    const awayCrest = match.away_crest
      ? `<img src="${escHtml(match.away_crest)}" class="inline-block w-5 h-5 object-contain mr-1 align-middle" onerror="this.style.display='none'" loading="lazy">`
      : "";

    function formBubble(r) {
      const cls = r === "W"
        ? "bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400"
        : r === "L"
        ? "bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-400"
        : "bg-gray-200 dark:bg-gray-700 text-gray-500 dark:text-gray-400";
      return `<span class="inline-flex items-center justify-center w-5 h-5 rounded-full text-[10px] font-semibold ${cls}">${r}</span>`;
    }
    const homeFormHtml = Array.isArray(match.home_form) && match.home_form.length
      ? match.home_form.map(formBubble).join("")
      : "";
    const awayFormHtml = Array.isArray(match.away_form) && match.away_form.length
      ? match.away_form.map(formBubble).join("")
      : "";
    const recentLabel = `<span class="hidden md:flex ml-2 text-[10px] text-gray-400 dark:text-gray-500 uppercase tracking-wider items-center gap-0.5"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>Recent</span>`;
    const hasForm = !!(homeFormHtml || awayFormHtml);

    return `
      <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl shadow-sm">

        <!-- Match header -->
        <div class="px-5 pt-4 pb-3">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              ${leagueName
                ? `<span class="inline-block ${leagueColor(match.league_key)} text-white text-xs font-bold px-2 py-0.5 rounded uppercase tracking-wider mb-2">${escHtml(leagueName)}</span>`
                : ""}${stageBadge}${secondLegBadge}
              <div class="grid grid-cols-1 md:grid-cols-[max-content_max-content_1fr] md:items-center gap-x-3 gap-y-1">
                <div class="order-1 md:order-none flex items-center gap-1 text-base font-semibold">
                  ${homeRank}${homeCrest}${escHtml(match.home_team)}
                </div>
                <div class="hidden md:block text-xs font-bold text-gray-400 dark:text-gray-500 text-center">vs</div>
                <div class="order-3 md:order-none flex items-center gap-1 text-base font-semibold">
                  ${awayRank}${awayCrest}${escHtml(match.away_team)}${h2hBadge ? ` ${h2hBadge}` : ""}
                </div>
                ${hasForm ? `
                <div class="order-2 md:order-none flex items-center gap-0.5 flex-wrap">${homeFormHtml}</div>
                <div class="hidden md:block text-gray-300 dark:text-gray-700 select-none text-center">·</div>
                <div class="order-4 md:order-none flex items-center gap-0.5 flex-wrap">${awayFormHtml}${recentLabel}</div>
                ` : ""}
              </div>
              ${fatigueRow}
              ${aggRow}
              ${bttsRow}
            </div>
            <p class="shrink-0 text-sm font-semibold text-gray-500 dark:text-gray-400 tabular-nums whitespace-nowrap pt-0.5">${escHtml(kickoff)}</p>
          </div>
        </div>

        <!-- Divider -->
        <div class="border-t border-gray-100 dark:border-gray-800 mx-0"></div>

        <!-- Bets table -->
        <div class="px-5 pt-3 pb-4">
          <table class="w-full table-fixed">
            <colgroup>
              <col>
              <col style="width:72px">
              <col style="width:72px">
              <col style="width:96px">
            </colgroup>
            <thead>
              <tr class="text-xs uppercase tracking-wider text-gray-400 dark:text-gray-500">
                <th class="pb-2 text-left font-semibold align-bottom">Bet</th>
                <th class="pb-2 pr-4 text-right font-semibold align-bottom">
                  <span class="col-tip justify-end"><span>Odds</span>${INFO}
                    <span class="tip">Decimal bookmaker odds — hover a cell for a worked example.</span>
                  </span>
                </th>
                <th class="pb-2 pr-4 text-right font-semibold align-bottom">
                  <span class="col-tip justify-end"><span>Chance</span>${INFO}
                    <span class="tip">Model's estimated true probability (Poisson goal model) — hover a cell for detail.</span>
                  </span>
                </th>
                <th class="pb-2 text-right font-semibold align-bottom">
                  <span class="col-tip justify-end"><span>Exp. Value</span>${INFO}
                    <span class="tip">Expected Value = (true probability × odds) − 1. Green 0–10%: solid edge. Amber 10–20%: strong find. ${WARN_ICON} Red &gt;20%: model may lack recent data — verify injury news. Hover a cell for a €100 example.</span>
                  </span>
                </th>
              </tr>
            </thead>
            <tbody>${betRows}</tbody>
          </table>
        </div>

      </div>`;
  }

  // ---------------------------------------------------------------------------
  // Bet list renderer (groups by day)
  // ---------------------------------------------------------------------------

  function renderBetList(bets, container) {
    if (bets.length === 0) {
      container.innerHTML = `
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl px-6 py-10 text-center text-sm text-gray-400 dark:text-gray-500">
          No value bets match the current filters.
        </div>`;
      return;
    }

    const groups = new Map();
    for (const bet of bets) {
      const dayKey = bet.kickoff
        ? new Date(bet.kickoff).toLocaleDateString(undefined, { year: "numeric", month: "2-digit", day: "2-digit" })
        : "Unknown";
      if (!groups.has(dayKey)) {
        groups.set(dayKey, {
          label: bet.kickoff
            ? new Date(bet.kickoff).toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" })
            : "Unknown date",
          bets: [],
        });
      }
      groups.get(dayKey).bets.push(bet);
    }

    const parts = [];
    for (const { label, bets: dayBets } of groups.values()) {
      parts.push(`
        <div class="text-xs font-bold uppercase tracking-widest text-gray-400 dark:text-gray-500 pt-2 pb-1.5 border-b-2 border-gray-200 dark:border-gray-700">
          ${escHtml(label)}
        </div>`);
      parts.push(...dayBets.map(renderCard));
    }

    container.innerHTML = parts.join("");
  }

  // ---------------------------------------------------------------------------
  // Tab rendering (sidebar + mobile bar share the same data; listeners added once)
  // ---------------------------------------------------------------------------

  function tabBtnHtml(t, mobile, isActive) {
    const betCount = t.bets.length;

    if (mobile) {
      const activeClasses  = "bg-blue-600 border-blue-600 text-white";
      const defaultClasses = "bg-white dark:bg-gray-900 border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 hover:border-blue-500 dark:hover:border-blue-500 hover:text-gray-900 dark:hover:text-gray-100";
      const countClasses   = isActive ? "bg-white/25 text-white" : "bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400";
      return `<button
        class="flex-shrink-0 flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-sm font-semibold border transition-colors ${isActive ? activeClasses : defaultClasses}"
        data-tab="${escHtml(t.key)}">
        <span>${escHtml(t.name)}</span>
        <span class="text-xs px-1.5 py-0.5 rounded-full ${countClasses}">${betCount}</span>
      </button>`;
    } else {
      const activeClasses  = "bg-blue-600 border-blue-600 text-white";
      const defaultClasses = "bg-white dark:bg-gray-900 border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 hover:border-blue-500 dark:hover:border-blue-500 hover:text-gray-900 dark:hover:text-gray-100";
      const countClasses   = isActive ? "bg-white/25 text-white" : "bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400";
      return `<button
        class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-sm font-semibold transition-colors ${isActive ? activeClasses : defaultClasses}"
        data-tab="${escHtml(t.key)}">
        <span>${escHtml(t.name)}</span>
        <span class="text-xs px-1.5 py-0.5 rounded-full ${countClasses}">${betCount}</span>
      </button>`;
    }
  }

  function updateTabUI(tabs, activeKey) {
    const leagueBar  = document.getElementById("league-bar");
    const leagueTabs = tabs.filter(t => t.key !== "__history__");
    leagueBar.innerHTML = leagueTabs.map(t => tabBtnHtml(t, true, t.key === activeKey)).join("");
  }

  // ---------------------------------------------------------------------------
  // History tab renderer
  // ---------------------------------------------------------------------------

  function renderHistory(history, container) {
    if (!history || !history.length) {
      container.innerHTML = `
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl px-6 py-10 text-center text-sm text-gray-400 dark:text-gray-500">
          No bet history yet. Run the engine daily and results will appear here automatically.
        </div>`;
      return;
    }

    // ── League key resolution (history may omit league_key) ──────────────────
    function leagueKeyFromName(name) {
      const n = (name || "").toLowerCase();
      if (n.includes("premier"))                      return "epl";
      if (n.includes("la liga") || n.includes("laliga")) return "laliga";
      if (n.includes("serie a"))                      return "seriea";
      if (n.includes("bundesliga"))                   return "bundesliga";
      if (n.includes("ligue"))                        return "ligue1";
      if (n.includes("champions") || n.includes("ucl")) return "ucl";
      return null;
    }
    function hLeagueKey(h) { return h.league_key || leagueKeyFromName(h.league_name); }

    // ── Base stats ────────────────────────────────────────────────────────────
    const settled  = history.filter(h => h.settled);
    const pending  = history.filter(h => !h.settled)
      .sort((a, b) => {
        const da = a.kickoff ? new Date(a.kickoff) : (a.recorded_date ? new Date(a.recorded_date) : 0);
        const db = b.kickoff ? new Date(b.kickoff) : (b.recorded_date ? new Date(b.recorded_date) : 0);
        return da - db;
      });
    const wins     = settled.filter(h => h.result === "won").length;
    const losses   = settled.filter(h => h.result === "lost").length;
    function stakeFor(odds) { return odds < 2 ? 20 : odds < 3 ? 10 : 5; }
    const pnl      = settled.reduce((acc, h) => {
      const s = stakeFor(h.odds);
      return acc + (h.result === "won" ? (h.odds - 1) * s : -s);
    }, 0);
    const pnlClass = pnl >= 0
      ? "text-green-600 dark:text-green-400"
      : "text-red-500 dark:text-red-400";
    const totalStake    = settled.reduce((acc, h) => acc + stakeFor(h.odds), 0);
    const roi          = totalStake
      ? ((pnl / totalStake) * 100).toFixed(1)
      : "—";
    const overallRoiNum = totalStake
      ? (pnl / totalStake) * 100
      : null;
    const winRate  = settled.length
      ? (wins / settled.length * 100).toFixed(0) + "%"
      : "—";
    const avgEv    = history.length
      ? "+" + (history.reduce((a, h) => a + h.ev, 0) / history.length * 100).toFixed(1) + "%"
      : "—";

    // ── Last 30 days ──────────────────────────────────────────────────────────
    const MS_30D           = 30 * 24 * 60 * 60 * 1000;
    const now              = Date.now();
    const lastMonthSettled = settled.filter(h => {
      const d = h.kickoff ? new Date(h.kickoff) : (h.recorded_date ? new Date(h.recorded_date) : null);
      return d && (now - d.getTime()) <= MS_30D;
    });
    const lmPnl   = lastMonthSettled.reduce((acc, h) => {
      const s = stakeFor(h.odds);
      return acc + (h.result === "won" ? (h.odds - 1) * s : -s);
    }, 0);
    const lmTotalStake = lastMonthSettled.reduce((acc, h) => acc + stakeFor(h.odds), 0);
    const lmRoiNum = lmTotalStake
      ? (lmPnl / lmTotalStake) * 100
      : null;
    const lmRoi   = lmRoiNum !== null ? lmRoiNum.toFixed(1) : null;
    const lmDelta = (lmRoiNum !== null && overallRoiNum !== null)
      ? (lmRoiNum - overallRoiNum).toFixed(1)
      : null;
    const lmClass = lmRoiNum === null ? "text-gray-400"
      : lmRoiNum >= 0 ? "text-green-600 dark:text-green-400"
      : "text-red-500 dark:text-red-400";

    // ── Per-league stats ──────────────────────────────────────────────────────
    const leagueMap = new Map();
    for (const h of history) {
      const name = h.league_name || "Unknown";
      if (!leagueMap.has(name)) leagueMap.set(name, { name, key: hLeagueKey(h), all: [], settled: [] });
      leagueMap.get(name).all.push(h);
      if (h.settled) leagueMap.get(name).settled.push(h);
    }

    function resultBadge(h) {
      if (!h.settled) return `<span class="inline-block bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400 text-xs font-semibold px-2 py-0.5 rounded">Pending</span>`;
      return h.result === "won"
        ? `<span class="inline-block bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400 text-xs font-semibold px-2 py-0.5 rounded">Won</span>`
        : `<span class="inline-block bg-red-100 dark:bg-red-900/40 text-red-600 dark:text-red-400 text-xs font-semibold px-2 py-0.5 rounded">Lost</span>`;
    }

    function scoreCell(h) {
      if (!h.settled || h.actual_home_goals == null) return `<span class="text-gray-400">—</span>`;
      return `<span class="font-mono font-semibold">${h.actual_home_goals}–${h.actual_away_goals}</span>`;
    }

    function rowDateKey(h) {
      const ko = h.kickoff ? new Date(h.kickoff) : null;
      return ko
        ? ko.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" })
        : (h.recorded_date || "Unknown");
    }

    function historyRow(h, isFirstBet = true, isLastBet = true) {
      const borderClass = isLastBet ? "border-b border-gray-100 dark:border-gray-800" : "";
      return `
        <tr class="${borderClass} hover:bg-gray-50 dark:hover:bg-gray-800/50">
          <td class="py-2 px-4 whitespace-nowrap">
            ${isFirstBet ? `<span class="inline-block ${leagueColor(hLeagueKey(h))} text-white text-xs font-bold px-2 py-0.5 rounded uppercase tracking-wider">${escHtml(LEAGUE_SHORT[hLeagueKey(h)] || h.league_name || "—")}</span>` : ""}
          </td>
          <td class="py-2 px-4 text-sm">
            ${isFirstBet ? `<div><span class="font-medium">${escHtml(h.home_team)}</span>
            <span class="text-gray-400 dark:text-gray-500 mx-1 text-xs">vs</span>
            <span class="font-medium">${escHtml(h.away_team)}</span></div>` : ""}
          </td>
          <td class="py-2 px-4">
            <span class="inline-block bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs font-semibold px-2 py-0.5 rounded">${escHtml(h.outcome_label)}</span>
          </td>
          <td class="py-2 px-4 font-mono text-sm text-right tabular-nums">${h.odds.toFixed(2)}</td>
          <td class="py-2 px-4 text-sm text-right tabular-nums text-gray-500 dark:text-gray-400">${(h.true_prob * 100).toFixed(1)}%</td>
          <td class="py-2 px-4 text-sm text-right tabular-nums font-semibold ${evClass(h.ev)}">+${(h.ev * 100).toFixed(1)}%</td>
          <td class="py-2 px-4 text-sm text-center">${scoreCell(h)}</td>
          <td class="py-2 px-4">${resultBadge(h)}</td>
        </tr>`;
    }

    function tableHtml(rows) {
      if (!rows.length) return `
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl px-6 py-8 text-center text-sm text-gray-400 dark:text-gray-500">
          No bets in this category.
        </div>`;

      // Group rows by date
      const groupOrder = [];
      const groupMap   = new Map();
      for (const h of rows) {
        const key = rowDateKey(h);
        if (!groupMap.has(key)) { groupMap.set(key, []); groupOrder.push(key); }
        groupMap.get(key).push(h);
      }

      const bodyRows = groupOrder.map(key => {
        // Group bets within this date by match
        const matchOrder = [];
        const matchMap   = new Map();
        for (const h of groupMap.get(key)) {
          const mKey = `${h.home_team}|${h.away_team}`;
          if (!matchMap.has(mKey)) { matchMap.set(mKey, []); matchOrder.push(mKey); }
          matchMap.get(mKey).push(h);
        }
        const rowsHtml = matchOrder.map(mKey => {
          const bets = matchMap.get(mKey);
          return bets.map((h, i) => historyRow(h, i === 0, i === bets.length - 1)).join("");
        }).join("");
        return `
        <tr>
          <td colspan="8" class="px-4 pt-3 pb-1 text-xs font-bold uppercase tracking-widest text-gray-400 dark:text-gray-500 bg-gray-50 dark:bg-gray-800/50">${escHtml(key)}</td>
        </tr>
        ${rowsHtml}`;
      }).join("");

      return `
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl">
          <div class="w-full overflow-x-auto no-scrollbar">
          <table class="min-w-max w-full text-left">
            <thead>
              <tr class="border-b border-gray-100 dark:border-gray-800 text-xs text-gray-400 dark:text-gray-500 uppercase tracking-wider">
                <th class="px-4 py-2 font-semibold">League</th>
                <th class="px-4 py-2 font-semibold">Match</th>
                <th class="px-4 py-2 font-semibold">Bet</th>
                <th class="px-4 py-2 font-semibold text-right">Odds</th>
                <th class="px-4 py-2 font-semibold text-right">Model%</th>
                <th class="px-4 py-2 font-semibold text-right">EV</th>
                <th class="px-4 py-2 font-semibold text-center">Score</th>
                <th class="px-4 py-2 font-semibold">Result</th>
              </tr>
            </thead>
            <tbody>
              ${bodyRows}
            </tbody>
          </table>
          </div>
        </div>`;
    }

    const FILTERS = [
      { key: "pending", label: "Pending", rows: () => pending },
      { key: "settled", label: "Settled", rows: () => settled },
      { key: "won",     label: "Won",     rows: () => settled.filter(h => h.result === "won") },
      { key: "lost",    label: "Lost",    rows: () => settled.filter(h => h.result === "lost") },
    ];

    let activeFilter = pending.length ? "pending" : "settled";

    // ── Last 30d card HTML ────────────────────────────────────────────────────
    const lmDeltaHtml = lmDelta !== null
      ? `<div class="text-xs mt-1 text-gray-400 dark:text-gray-500">
           vs ${overallRoiNum >= 0 ? "+" : ""}${overallRoiNum.toFixed(1)}% overall
           <span class="${parseFloat(lmDelta) >= 0 ? "text-green-600 dark:text-green-400" : "text-red-500 dark:text-red-400"} font-semibold ml-1">${parseFloat(lmDelta) >= 0 ? "▲ +" : "▼ "}${lmDelta}%</span>
         </div>`
      : `<div class="text-xs mt-1 text-gray-400 dark:text-gray-500">No settled bets yet</div>`;

    // ── Per-league cards HTML ─────────────────────────────────────────────────
    const leagueCardsHtml = Array.from(leagueMap.values()).map(lg => {
      const lgWins   = lg.settled.filter(h => h.result === "won").length;
      const lgLosses = lg.settled.filter(h => h.result === "lost").length;
      const lgPnl    = lg.settled.reduce((acc, h) => {
        const s = stakeFor(h.odds);
        return acc + (h.result === "won" ? (h.odds - 1) * s : -s);
      }, 0);
      const lgTotalStake = lg.settled.reduce((acc, h) => acc + stakeFor(h.odds), 0);
      const lgRoiNum = lgTotalStake ? (lgPnl / lgTotalStake) * 100 : null;
      const lgRoi    = lgRoiNum !== null ? (lgRoiNum >= 0 ? "+" : "") + lgRoiNum.toFixed(1) + "%" : "—";
      const lgRoiClass = lgRoiNum === null ? "text-gray-400"
        : lgRoiNum >= 0 ? "text-green-600 dark:text-green-400"
        : "text-red-500 dark:text-red-400";
      return `
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl px-4 py-3 min-w-0 min-h-0">
          <div class="flex items-center gap-1.5 mb-2">
            <span class="inline-block ${leagueColor(lg.key)} text-white text-xs font-bold px-1.5 py-0.5 rounded uppercase leading-tight whitespace-nowrap">${escHtml(LEAGUE_SHORT[lg.key] || lg.name)}</span>
          </div>
          <div class="text-xs text-gray-400 dark:text-gray-500">${lg.all.length} bets · <span class="text-green-600 dark:text-green-400 font-semibold">${lgWins}W</span>/<span class="text-red-500 dark:text-red-400 font-semibold">${lgLosses}L</span></div>
          <div class="text-lg font-bold ${lgRoiClass} mt-0.5">${lgRoi} <span class="text-xs font-normal text-gray-400">ROI</span></div>
        </div>`;
    }).join("");

    const summaryHtml = `
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-4">
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl px-4 py-3">
          <div class="text-xs text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-1">Total Bets</div>
          <div class="text-2xl font-bold text-gray-900 dark:text-white">${history.length}</div>
        </div>
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl px-4 py-3">
          <div class="text-xs text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-1">Record</div>
          <div class="text-2xl font-bold"><span class="text-green-600 dark:text-green-400">${wins}W</span><span class="text-gray-300 dark:text-gray-600 mx-1">/</span><span class="text-red-500 dark:text-red-400">${losses}L</span></div>
        </div>
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl px-4 py-3">
          <div class="text-xs text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-1">Win Rate</div>
          <div class="text-2xl font-bold text-gray-900 dark:text-white">${winRate}</div>
        </div>
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl px-4 py-3">
          <div class="text-xs text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-1">Avg EV</div>
          <div class="text-2xl font-bold text-gray-900 dark:text-white">${avgEv}</div>
        </div>
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl px-4 py-3">
          <div class="text-xs text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-1">P&amp;L · ROI</div>
          <div class="text-2xl font-bold ${pnlClass}">${pnl >= 0 ? "+" : ""}€${pnl.toFixed(0)}<span class="text-base font-semibold ml-1">${pnl >= 0 ? "+" : ""}${roi}%</span></div>
        </div>
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl px-4 py-3">
          <div class="text-xs text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-1">Last 30 Days</div>
          <div class="text-2xl font-bold ${lmClass}">${lmRoi !== null ? (parseFloat(lmRoi) >= 0 ? "+" : "") + lmRoi + "%" : "—"}</div>
          ${lmDeltaHtml}
        </div>
      </div>
      ${leagueMap.size > 0 ? `
      <div class="mb-5">
        <div class="text-xs font-bold uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-2">By League</div>
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">${leagueCardsHtml}</div>
      </div>` : ""}`;

    function tabsHtml(active) {
      return `<div class="flex gap-1 border-b border-gray-200 dark:border-gray-700 mb-4 overflow-x-auto no-scrollbar whitespace-nowrap">
        ${FILTERS.map(f => {
          const isActive = f.key === active;
          const count = f.rows().length;
          return `<button data-hfilter="${f.key}" class="px-4 py-2 text-sm font-medium border-b-2 -mb-px transition-colors ${isActive
            ? "border-blue-500 text-gray-900 dark:text-white"
            : "border-transparent text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300"}">${escHtml(f.label)}<span class="ml-1.5 text-xs ${isActive ? "text-blue-500" : "text-gray-400 dark:text-gray-600"}">${count}</span></button>`;
        }).join("")}
      </div>`;
    }

    function refresh() {
      const f = FILTERS.find(f => f.key === activeFilter);
      document.getElementById("hist-tabs").innerHTML  = tabsHtml(activeFilter);
      document.getElementById("hist-table").innerHTML = tableHtml(f ? f.rows() : []);
      document.querySelectorAll("[data-hfilter]").forEach(btn => {
        btn.addEventListener("click", () => { activeFilter = btn.dataset.hfilter; refresh(); });
      });
    }

    container.innerHTML = summaryHtml
      + `<div id="hist-tabs"></div>`
      + `<div id="hist-table"></div>`;

    refresh();
  }

  // ---------------------------------------------------------------------------
  // Main loader
  // ---------------------------------------------------------------------------

  function loadReport() {
    const container = document.getElementById("container");
    const errorMsg  = document.getElementById("error-msg");
    const footer    = document.getElementById("footer");

    try {
      const raw  = document.getElementById("report-data").textContent.trim();
      const data = JSON.parse(raw);

      if (!data || !data.value_bets) {
        errorMsg.classList.remove("hidden");
        errorMsg.textContent = "No report found. Run python main.py first to generate today's report.";
        return;
      }

      // Migrate old flat format (one entry per outcome) → new nested format (one per match)
      if (data.value_bets.length > 0 && !data.value_bets[0].bets) {
        const matchMap = new Map();
        for (const b of data.value_bets) {
          const key = `${b.league_key}|${b.home_team}|${b.away_team}|${b.kickoff}`;
          if (!matchMap.has(key)) {
            matchMap.set(key, {
              league_key: b.league_key, league_name: b.league_name,
              home_team: b.home_team,   away_team: b.away_team,
              kickoff: b.kickoff,       kickoff_local: b.kickoff_local,
              btts_yes_prob: b.btts_yes_prob ?? null,
              bets: [],
            });
          }
          matchMap.get(key).bets.push({
            outcome: b.outcome, outcome_label: b.outcome_label,
            odds: b.odds, true_prob: b.true_prob, ev: b.ev,
          });
        }
        data.value_bets = Array.from(matchMap.values());
      }


      if (data.value_bets.length === 0) {
        container.innerHTML = `
          <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl px-6 py-10 text-center text-sm text-gray-400 dark:text-gray-500">
            No value bets found today. Check back tomorrow.
          </div>`;
        return;
      }

      // Build tab list
      const leagueMap = new Map();
      for (const match of data.value_bets) {
        const key = match.league_key || "other";
        if (!leagueMap.has(key)) leagueMap.set(key, { key, name: LEAGUE_SHORT[key] || match.league_name || key, bets: [] });
        leagueMap.get(key).bets.push(match);
      }
      const history = data.history || [];
      const historyTab = { key: "__history__", name: "History", bets: history };
      const tabs = [{ key: "all", name: "All", bets: data.value_bets }, ...leagueMap.values(), historyTab];
      let activeTab = "all";
      let activeBetType = "all";
      let activeTeamSearch = "";
      let currentTabMatches = [];
      let advFilters = { evMin: null, evMax: null, oddsMin: null, oddsMax: null, probMin: 0, safeMode: false };
      function parseFloatOrNull(v) { const n = parseFloat(v); return isNaN(n) ? null : n; }

      function updateFilterBadge() {
        const count = [
          activeTab !== "all",
          activeBetType !== "all",
          advFilters.evMin   !== null,
          advFilters.evMax   !== null,
          advFilters.oddsMin !== null,
          advFilters.oddsMax !== null,
          advFilters.probMin > 0,
          advFilters.safeMode,
        ].filter(Boolean).length;
        const badge    = document.getElementById("filters-count-badge");
        const clearBtn = document.getElementById("clear-filters-btn");
        if (badge) {
          badge.textContent = count;
          badge.style.display = count === 0 ? "none" : "inline-flex";
        }
        if (clearBtn) {
          clearBtn.disabled = count === 0;
          clearBtn.className = count === 0
            ? "flex items-center gap-1 px-3 py-1 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-400 dark:text-gray-600 transition-colors opacity-50 cursor-not-allowed"
            : "flex items-center gap-1 px-3 py-1 text-sm font-medium rounded-lg border border-red-200 dark:border-red-800 bg-white dark:bg-gray-900 text-red-500 dark:text-red-400 hover:border-red-400 dark:hover:border-red-600 hover:text-red-700 dark:hover:text-red-300 transition-colors";
        }
        updateFilterChips();
      }

      function updateFilterChips() {
        const chips = [];
        if (activeTab !== "all") {
          const tab = tabs.find(t => t.key === activeTab);
          if (tab) chips.push(tab.name);
        }
        if (activeBetType !== "all") {
          const bt = BET_TYPES.find(t => t.key === activeBetType);
          if (bt) chips.push(bt.label);
        }
        if (advFilters.evMin   !== null) chips.push(`EV ≥ ${advFilters.evMin}%`);
        if (advFilters.evMax   !== null) chips.push(`EV ≤ ${advFilters.evMax}%`);
        if (advFilters.oddsMin !== null) chips.push(`Odds ≥ ${advFilters.oddsMin}`);
        if (advFilters.oddsMax !== null) chips.push(`Odds ≤ ${advFilters.oddsMax}`);
        if (advFilters.probMin > 0)      chips.push(`Prob ≥ ${advFilters.probMin}%`);
        if (advFilters.safeMode)         chips.push("Safe Mode");
        const container = document.getElementById("active-filters-chips");
        if (!container) return;
        container.innerHTML = chips.map(label =>
          `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 border border-blue-200 dark:border-blue-800">${escHtml(label)}</span>`
        ).join("");
      }

      function syncAdvFilters() {
        advFilters = {
          evMin:    parseFloatOrNull(document.getElementById("filter-ev-min").value),
          evMax:    parseFloatOrNull(document.getElementById("filter-ev-max").value),
          oddsMin:  parseFloatOrNull(document.getElementById("filter-odds-min").value),
          oddsMax:  parseFloatOrNull(document.getElementById("filter-odds-max").value),
          probMin:  parseFloat(document.getElementById("filter-prob-min").value) || 0,
          safeMode: document.getElementById("filter-safe-mode").checked,
        };
        applyFilters();
      }

      const BET_TYPES = [
        { key: "all",       label: "All Types" },
        { key: "home_win",  label: "Home Win" },
        { key: "draw",      label: "Draw" },
        { key: "away_win",  label: "Away Win" },
        { key: "over_2_5",  label: "Over 2.5" },
        { key: "under_2_5", label: "Under 2.5" },
        { key: "btts_yes",  label: "BTTS Yes" },
        { key: "btts_no",   label: "BTTS No" },
      ];

      function applyFilters() {
        const filterWrapper = document.getElementById("filter-wrapper");
        if (activeTab === "__history__") {
          if (filterWrapper) filterWrapper.classList.add("hidden");
          renderHistory(history, container);
          return;
        }
        if (filterWrapper) filterWrapper.classList.remove("hidden");

        const tab = tabs.find(t => t.key === activeTab);
        let matches = tab ? tab.bets : [];

        if (activeTeamSearch.trim()) {
          const q = activeTeamSearch.trim().toLowerCase();
          matches = matches.filter(m =>
            m.home_team.toLowerCase().includes(q) ||
            m.away_team.toLowerCase().includes(q)
          );
        }

        currentTabMatches = matches;
        updateBetTypePills(matches);

        if (activeBetType !== "all") {
          matches = matches
            .map(m => ({ ...m, bets: m.bets.filter(b => b.outcome === activeBetType) }))
            .filter(m => m.bets.length > 0);
        }

        matches = matches.map(m => ({
          ...m,
          bets: m.bets.filter(b => {
            if (advFilters.evMin  !== null && b.ev * 100 < advFilters.evMin)  return false;
            if (advFilters.evMax  !== null && b.ev * 100 > advFilters.evMax)  return false;
            if (advFilters.oddsMin !== null && b.odds < advFilters.oddsMin)   return false;
            if (advFilters.oddsMax !== null && b.odds > advFilters.oddsMax)   return false;
            if (advFilters.probMin > 0 && (b.true_prob ?? 0) * 100 < advFilters.probMin) return false;
            if (advFilters.safeMode && b.ev > 0.20) return false;
            return true;
          })
        })).filter(m => m.bets.length > 0);

        updateFilterBadge();
        renderBetList(matches, container);
      }

      function updateBetTypePills(matches) {
        const pContainer = document.getElementById("bet-type-pills");
        if (!pContainer) return;
        pContainer.innerHTML = BET_TYPES.map(t => {
          const isActive = t.key === activeBetType;
          const count = t.key === "all"
            ? matches.length
            : matches.filter(m => m.bets.some(b => b.outcome === t.key)).length;
          const activeClasses  = "bg-blue-600 border-blue-600 text-white";
          const defaultClasses = "bg-white dark:bg-gray-900 border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 hover:border-blue-500 dark:hover:border-blue-500 hover:text-gray-900 dark:hover:text-gray-100";
          const countClasses   = isActive ? "bg-white/25 text-white" : "bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400";
          return `<button data-bet-type="${escHtml(t.key)}"
            class="flex-shrink-0 flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-sm font-semibold border transition-colors ${isActive ? activeClasses : defaultClasses}">
            <span>${escHtml(t.label)}</span>
            <span class="text-xs px-1.5 py-0.5 rounded-full ${countClasses}">${count}</span>
          </button>`;
        }).join("");
      }

      function updateBetTypeUI() {
        updateBetTypePills(currentTabMatches);
      }

      function buildFilterBar() {
        const filterBar = document.getElementById("filter-bar");
        filterBar.innerHTML = `
          <input id="team-search" type="text" placeholder="Search team…"
            class="w-full md:w-auto px-3 py-1 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-700 dark:text-gray-300 placeholder-gray-400 dark:placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
            value="${escHtml(activeTeamSearch)}">
          <button id="open-filters-btn"
            class="w-full md:w-auto flex justify-center items-center gap-1.5 px-3 py-1 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-600 dark:text-gray-300 hover:border-gray-400 dark:hover:border-gray-500 hover:text-gray-900 dark:hover:text-gray-100 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
              <path d="M5 4a1 1 0 00-2 0v7.268a2 2 0 000 3.464V16a1 1 0 102 0v-1.268a2 2 0 000-3.464V4zM11 4a1 1 0 10-2 0v1.268a2 2 0 000 3.464V16a1 1 0 102 0V8.732a2 2 0 000-3.464V4zM16 3a1 1 0 011 1v7.268a2 2 0 010 3.464V16a1 1 0 11-2 0v-1.268a2 2 0 010-3.464V4a1 1 0 011-1z"/>
            </svg>
            Filters
            <span id="filters-count-badge" style="display:none" class="inline-flex items-center justify-center text-xs font-bold bg-blue-600 text-white rounded-full w-4 h-4">0</span>
          </button>
          <button id="clear-filters-btn" disabled
            class="w-full md:w-auto flex justify-center items-center gap-1 px-3 py-1 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-400 dark:text-gray-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
            </svg>
            Clear filters
          </button>
          <div id="active-filters-chips" class="flex items-center gap-2 flex-wrap"></div>`;

        function openDrawer() {
          document.getElementById("filters-drawer").classList.remove("translate-x-full");
          document.getElementById("filters-backdrop").classList.remove("hidden");
          document.body.classList.add("overflow-hidden");
        }
        function closeDrawer() {
          document.getElementById("filters-drawer").classList.add("translate-x-full");
          document.getElementById("filters-backdrop").classList.add("hidden");
          document.body.classList.remove("overflow-hidden");
        }

        document.addEventListener("click", e => {
          if (e.target.closest("#open-filters-btn"))  { openDrawer();  return; }
          if (e.target.closest("#close-filters-btn")) { closeDrawer(); return; }
          if (e.target.closest("#filters-backdrop"))  { closeDrawer(); return; }
          if (e.target.closest("#clear-filters-btn")) {
            advFilters = { evMin: null, evMax: null, oddsMin: null, oddsMax: null, probMin: 0, safeMode: false };
            activeTab = "all";
            activeBetType = "all";
            document.getElementById("filter-ev-min").value   = "";
            document.getElementById("filter-ev-max").value   = "";
            document.getElementById("filter-odds-min").value = "";
            document.getElementById("filter-odds-max").value = "";
            document.getElementById("filter-prob-min").value = 0;
            document.getElementById("filter-prob-min-value").textContent = "0%";
            document.getElementById("filter-safe-mode").checked = false;
            updateTabUI(tabs, activeTab);
            updateNavUI(activeTab);
            applyFilters();
            return;
          }
          const tabBtn = e.target.closest("[data-tab]");
          if (tabBtn) { activateTab(tabBtn.dataset.tab); return; }
          const btn = e.target.closest("[data-bet-type]");
          if (btn) {
            activeBetType = btn.dataset.betType;
            updateBetTypeUI();
            applyFilters();
          }
        });

        ["filter-ev-min","filter-ev-max","filter-odds-min","filter-odds-max"].forEach(id => {
          document.getElementById(id).addEventListener("input", syncAdvFilters);
        });
        document.getElementById("filter-prob-min").addEventListener("input", e => {
          document.getElementById("filter-prob-min-value").textContent = e.target.value + "%";
          syncAdvFilters();
        });
        document.getElementById("filter-safe-mode").addEventListener("change", syncAdvFilters);

        let debounceTimer;
        document.getElementById("team-search").addEventListener("input", e => {
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(() => {
            activeTeamSearch = e.target.value;
            applyFilters();
          }, 200);
        });
      }

      function updateNavUI(activeKey) {
        const dashBtn = document.getElementById("nav-dashboard");
        const histBtn = document.getElementById("nav-history");
        if (!dashBtn || !histBtn) return;
        const isHistory = activeKey === "__history__";
        dashBtn.className = `px-1 py-2 text-sm font-semibold transition-colors ${
          isHistory ? "text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100"
                    : "text-gray-900 dark:text-white border-b-2 border-blue-600"}`;
        histBtn.className = `px-1 py-2 text-sm font-semibold transition-colors ${
          isHistory ? "text-gray-900 dark:text-white border-b-2 border-blue-600"
                    : "text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100"}`;
      }

      function activateTab(tabKey) {
        activeTab = tabKey;
        updateTabUI(tabs, activeTab);
        updateNavUI(tabKey);
        applyFilters();
      }

      // Single delegated listener for both nav elements
      function handleTabClick(e) {
        const btn = e.target.closest("[data-tab]");
        if (btn) activateTab(btn.dataset.tab);
      }
      updateTabUI(tabs, activeTab);
      buildFilterBar();
      applyFilters();
      window._activateTab = activateTab;

      if (data.generated_at) {
        const gen = new Date(data.generated_at);
        const now = new Date();
        const genDate = new Date(gen.getFullYear(), gen.getMonth(), gen.getDate());
        const nowDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const diffDays = Math.round((nowDate - genDate) / 86400000);
        const timeStr = gen.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
        let label;
        if (diffDays === 0) label = `Today at ${timeStr}`;
        else if (diffDays === 1) label = `Yesterday at ${timeStr}`;
        else if (diffDays < 7) label = `${diffDays} days ago at ${timeStr}`;
        else if (diffDays < 30) label = "Last week";
        else label = "Last month";
        footer.textContent = `Generated ${label}`;
        const genAt = document.getElementById("generated-at");
        if (genAt) genAt.textContent = `Generated ${label}`;

        const mobileGenAt = document.getElementById("mobile-generated-at");
        if (mobileGenAt) mobileGenAt.textContent = `Generated ${label}`;
      }

    } catch (err) {
      errorMsg.classList.remove("hidden");
      errorMsg.textContent = `Error loading report: ${err.message}`;
      subtitle.textContent = "—";
    }
  }

  loadReport();
</script>
<script>
  document.addEventListener('click', function(e) {
    const colTip = e.target.closest('.col-tip');
    const active = document.querySelectorAll('.col-tip.active');
    if (colTip) {
      const wasActive = colTip.classList.contains('active');
      active.forEach(el => el.classList.remove('active'));
      if (!wasActive) colTip.classList.add('active');
    } else {
      active.forEach(el => el.classList.remove('active'));
    }
  });
</script>
</body>
</html>
